version: '3.9'

services:
  jengo-api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - JENGO_CONFIG_PATH=/app/.jengo/config.yaml
      - API_TOKEN=${API_TOKEN:-changeme}
      - JENGO_API_TOKENS=${JENGO_API_TOKENS:-}
    volumes:
      - jengo-config:/app/.jengo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  jengo-config:
    driver: local
